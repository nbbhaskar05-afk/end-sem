<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>End Sem Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent1: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affcc;
    --accent4: #ffcc6a;
    --accent5: #6ab4ff;
    --accent6: #ff9f6a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #4ade80;
    --warning: #facc15;
    --danger: #f87171;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(124,106,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(124,106,255,0.03) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }
  .container { max-width:1100px; margin:0 auto; padding:0 20px; position:relative; z-index:1; }
 
  /* HEADER */
  header { padding:40px 0 20px; border-bottom:1px solid var(--border); margin-bottom:32px; }
  .header-inner { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; }
  .logo-block h1 { font-family:'Syne',sans-serif; font-size:clamp(1.6rem,4vw,2.4rem); font-weight:800; letter-spacing:-0.03em; line-height:1.1; }
  .logo-block h1 span { color:var(--accent1); }
  .logo-block p { color:var(--muted); font-size:0.75rem; margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; }
  .countdown-block { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:14px 20px; text-align:right; }
  .countdown-block .days { font-family:'Syne',sans-serif; font-size:2.2rem; font-weight:800; color:var(--accent1); line-height:1; }
  .countdown-block .days-label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
  .next-exam { font-size:0.72rem; color:var(--accent3); margin-top:4px; }
  .overall-bar-wrap { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:20px; margin-top:20px; }
  .overall-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .overall-top span { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
  .overall-top strong { font-family:'Syne',sans-serif; font-size:1.1rem; color:var(--accent3); }
  .bar-track { height:8px; background:var(--border); border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; background:linear-gradient(90deg,var(--accent1),var(--accent3)); border-radius:99px; transition:width 0.5s ease; }
 
  /* TABS */
  .tabs { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
  .tab { padding:8px 18px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'DM Mono',monospace; font-size:0.75rem; cursor:pointer; transition:all 0.2s; letter-spacing:0.05em; }
  .tab:hover { border-color:var(--accent1); color:var(--accent1); }
  .tab.active { background:var(--accent1); border-color:var(--accent1); color:#fff; }
 
  /* PANELS */
  .panel { display:none; }
  .panel.active { display:block; }
 
  /* SUBJECT CARDS */
  .subjects-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; }
  .subject-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:transform 0.2s; }
  .subject-card:hover { transform:translateY(-2px); }
  .card-header { padding:16px 18px 12px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; border-bottom:1px solid var(--border); }
  .card-header-left { flex:1; }
  .subject-name { font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; line-height:1.3; }
  .subject-meta { font-size:0.68rem; color:var(--muted); margin-top:3px; letter-spacing:0.05em; }
  .exam-badge { font-size:0.65rem; padding:4px 10px; border-radius:99px; font-weight:500; white-space:nowrap; flex-shrink:0; }
  .card-progress { padding:12px 18px; }
  .prog-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .prog-pct { font-size:0.72rem; color:var(--muted); }
  .prog-pct strong { color:var(--text); }
  .mini-bar-track { height:5px; background:var(--border); border-radius:99px; overflow:hidden; }
  .mini-bar-fill { height:100%; border-radius:99px; transition:width 0.4s ease; }
  .topics-list { padding:0 18px 14px; }
  .topic-item { display:flex; align-items:flex-start; gap:10px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; }
  .topic-item:last-child { border-bottom:none; }
  .topic-check { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; font-size:10px; }
  .topic-item.done .topic-check { background:var(--success); border-color:var(--success); color:#000; }
  .topic-item.done .topic-text { text-decoration:line-through; color:var(--muted); }
  .topic-text { font-size:0.72rem; line-height:1.5; }
  .unit-label { font-size:0.6rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); padding:10px 0 4px; opacity:0.7; margin-left:18px; }
 
  /* DAILY TARGETS */
  .targets-intro { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:24px; }
  .targets-intro p { font-size:0.75rem; color:var(--muted); line-height:1.7; }
  .targets-intro strong { color:var(--accent3); }
  .day-targets-grid { display:grid; gap:14px; }
  .dt-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .dt-card.exam-eve { border-color:var(--accent4)60; }
  .dt-card.exam-day { border-color:var(--danger)60; }
  .dt-card.today-card { border-color:var(--accent1); box-shadow:0 0 20px rgba(124,106,255,0.15); }
  .dt-header { padding:14px 18px; display:flex; align-items:center; gap:12px; cursor:pointer; user-select:none; }
  .dt-dateblock { text-align:center; min-width:40px; }
  .dt-day-num { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; line-height:1; }
  .dt-month { font-size:0.58rem; text-transform:uppercase; color:var(--muted); letter-spacing:0.1em; }
  .dt-info { flex:1; }
  .dt-weekday { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
  .dt-title { font-family:'Syne',sans-serif; font-size:0.88rem; font-weight:700; margin-top:2px; }
  .dt-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .dt-type-badge { font-size:0.6rem; padding:3px 8px; border-radius:99px; letter-spacing:0.06em; }
  .dt-prog { font-size:0.68rem; color:var(--muted); }
  .dt-toggle { font-size:0.8rem; color:var(--muted); transition:transform 0.2s; }
  .dt-card.open .dt-toggle { transform:rotate(180deg); }
  .dt-body { display:none; border-top:1px solid var(--border); }
  .dt-card.open .dt-body { display:block; }
  .dt-session { padding:12px 18px; border-bottom:1px solid rgba(255,255,255,0.04); }
  .dt-session:last-child { border-bottom:none; }
  .dt-session-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .dt-session-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; font-weight:600; }
  .dt-session-time { font-size:0.6rem; color:var(--muted); margin-left:auto; }
  .dt-task { display:flex; align-items:flex-start; gap:10px; padding:5px 0; cursor:pointer; }
  .dt-check { width:15px; height:15px; border-radius:3px; border:1.5px solid var(--border); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; font-size:9px; transition:all 0.2s; }
  .dt-task.done .dt-check { background:var(--success); border-color:var(--success); color:#000; }
  .dt-task.done .dt-task-text { text-decoration:line-through; color:var(--muted); }
  .dt-task-text { font-size:0.71rem; line-height:1.5; }
  .dt-task-dur { font-size:0.62rem; color:var(--muted); margin-left:auto; flex-shrink:0; padding-left:8px; }
  .dt-footer { padding:10px 18px; background:rgba(255,255,255,0.02); display:flex; justify-content:space-between; align-items:center; }
  .dt-total-time { font-size:0.65rem; color:var(--muted); }
  .dt-day-prog { display:flex; align-items:center; gap:8px; }
  .dt-day-prog-bar { width:80px; height:4px; background:var(--border); border-radius:99px; overflow:hidden; }
  .dt-day-prog-fill { height:100%; border-radius:99px; transition:width 0.3s; }
 
  /* STUDY PLAN (old) */
  .plan-grid { display:grid; gap:16px; }
  .day-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .day-header { padding:14px 18px; display:flex; align-items:center; gap:14px; cursor:pointer; user-select:none; }
  .day-num { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; color:var(--accent1); line-height:1; min-width:32px; }
  .day-info { flex:1; }
  .day-date { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
  .day-focus { font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:600; margin-top:2px; }
  .day-tag { font-size:0.62rem; padding:3px 9px; border-radius:99px; border:1px solid; letter-spacing:0.06em; }
  .day-toggle { color:var(--muted); font-size:0.8rem; transition:transform 0.2s; }
  .day-card.open .day-toggle { transform:rotate(180deg); }
  .day-tasks { display:none; padding:0 18px 14px; border-top:1px solid var(--border); }
  .day-card.open .day-tasks { display:block; }
  .task-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; }
  .task-item:last-child { border-bottom:none; }
  .task-check { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; font-size:10px; transition:all 0.2s; }
  .task-item.done .task-check { background:var(--success); border-color:var(--success); color:#000; }
  .task-item.done .task-label { text-decoration:line-through; color:var(--muted); }
  .task-label { font-size:0.73rem; line-height:1.5; }
  .task-time { font-size:0.62rem; color:var(--muted); margin-left:auto; flex-shrink:0; padding-left:8px; }
  .day-hours { font-size:0.65rem; color:var(--muted); margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
 
  /* STATS */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
  .stat-num { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; line-height:1; }
  .stat-label { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-top:6px; }
  .subject-bars { display:grid; gap:12px; }
  .sub-bar-row { display:grid; grid-template-columns:120px 1fr 40px; align-items:center; gap:12px; }
  .sub-bar-name { font-size:0.7rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
 
  /* EXAMS */
  .exam-list { display:grid; gap:10px; }
  .exam-row { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; display:flex; align-items:center; gap:16px; }
  .exam-date-block { text-align:center; min-width:44px; }
  .exam-day { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; line-height:1; }
  .exam-month { font-size:0.6rem; text-transform:uppercase; color:var(--muted); letter-spacing:0.1em; }
  .exam-info { flex:1; }
  .exam-subj { font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:600; }
  .exam-code { font-size:0.65rem; color:var(--muted); margin-top:2px; }
 
  .reset-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:0.7rem; padding:8px 14px; border-radius:6px; cursor:pointer; transition:all 0.2s; margin-top:20px; }
  .reset-btn:hover { border-color:var(--accent2); color:var(--accent2); }
 
  .today-pill { background:var(--accent1); color:#fff; font-size:0.58rem; padding:2px 7px; border-radius:99px; letter-spacing:0.06em; }
 
  @media(max-width:600px) {
    .subjects-grid { grid-template-columns:1fr; }
    .sub-bar-row { grid-template-columns:90px 1fr 36px; }
  }
</style>
</head>

      {label:'Op-Amp',topics:['Ideal OPAMP & virtual ground','CMRR & differential/common mode gain','Inverting & non-inverting amplifier','Summing & differential amplifier']},
      {label:'Digital Electronics',topics:['Number systems & conversions','Logic gates & truth tables','Universal gates (NAND & NOR)','Half adder & subtractor','RS & JK flip-flops','Shift register & ripple counter']},
      {label:'Misc Devices & Communication',topics:['LED, photodiode, phototransistor','Snell\'s law, TIR & fiber optics','AM fundamentals','FM fundamentals']}
    ]}
];
 
// ── STATE ──
function getState(){ try{return JSON.parse(localStorage.getItem('esem_state')||'{}')}catch{return{}} }
function setState(s){ localStorage.setItem('esem_state',JSON.stringify(s)) }
function toggleTopic(sid,ui,ti){const s=getState();const k=`${sid}_${ui}_${ti}`;s[k]=!s[k];setState(s);render()}
function resetAll(){if(confirm('Reset ALL progress?')){localStorage.removeItem('esem_state');render()}}
 
// ── RENDER ──
function render(){
  const s=getState();
  renderCountdown();
  renderOverall(s);
  renderSyllabus(s);
  renderStats(s);
  renderExams();
}
 
function renderCountdown(){
  const first=new Date('2026-04-13T15:00:00');
  const now=new Date();
  const diff=Math.ceil((first-now)/(1000*60*60*24));
  document.getElementById('daysLeft').textContent=Math.max(0,diff);
  // find next upcoming exam
  const upcoming=SUBJECTS.filter(s=>new Date(s.examDate)>=new Date()).sort((a,b)=>new Date(a.examDate)-new Date(b.examDate));
  if(upcoming.length) document.getElementById('nextExamLabel').textContent=`→ Next: ${upcoming[0].code} on Apr ${new Date(upcoming[0].examDate).getDate()}`;
}
 
function renderOverall(s){
  let total=0,done=0;
  SUBJECTS.forEach(sub=>sub.units.forEach((u,ui)=>u.topics.forEach((_,ti)=>{total++;if(s[`${sub.id}_${ui}_${ti}`])done++;})));
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('overallPct').textContent=pct+'%';
  document.getElementById('overallBar').style.width=pct+'%';
}
 
 
 
function renderSyllabus(s){
  const grid=document.getElementById('subjectsGrid');
  grid.innerHTML='';
  SUBJECTS.forEach(sub=>{
    let total=0,done=0;
    sub.units.forEach((u,ui)=>u.topics.forEach((_,ti)=>{total++;if(s[`${sub.id}_${ui}_${ti}`])done++;}));
    const pct=total?Math.round(done/total*100):0;
    const examDate=new Date(sub.examDate);
    const daysLeft=Math.ceil((examDate-new Date())/(1000*60*60*24));
    const card=document.createElement('div');
    card.className='subject-card';
    card.style.borderTop=`3px solid ${sub.color}`;
    let unitsHTML='';
    sub.units.forEach((u,ui)=>{
      unitsHTML+=`<div class="unit-label">${u.label}</div>`;
      u.topics.forEach((t,ti)=>{
        const isDone=!!s[`${sub.id}_${ui}_${ti}`];
        unitsHTML+=`<div class="topic-item ${isDone?'done':''}" onclick="toggleTopic('${sub.id}',${ui},${ti})">
          <div class="topic-check">${isDone?'✓':''}</div>
          <div class="topic-text">${t}</div>
        </div>`;
      });
    });
    card.innerHTML=`
      <div class="card-header">
        <div class="card-header-left">
          <div class="subject-name">${sub.name}</div>
          <div class="subject-meta">${sub.code} · ${daysLeft>0?daysLeft+' days left':'EXAM TODAY!'}</div>
        </div>
        <div class="exam-badge" style="background:${sub.bg};color:${sub.color};border:1px solid ${sub.color}40">Apr ${examDate.getDate()}</div>
      </div>
      <div class="card-progress">
        <div class="prog-row"><span class="prog-pct"><strong>${done}/${total}</strong> topics</span><span class="prog-pct"><strong>${pct}%</strong></span></div>
        <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${sub.color}"></div></div>
      </div>
      <div class="topics-list">${unitsHTML}</div>`;
    grid.appendChild(card);
  });
}
 
function renderStats(s){
  let totalTopics=0,doneTopics=0;
  SUBJECTS.forEach(sub=>sub.units.forEach((u,ui)=>u.topics.forEach((_,ti)=>{totalTopics++;if(s[`${sub.id}_${ui}_${ti}`])doneTopics++;})));
  const subsDone=SUBJECTS.filter(sub=>{let t=0,d=0;sub.units.forEach((u,ui)=>u.topics.forEach((_,ti)=>{t++;if(s[`${sub.id}_${ui}_${ti}`])d++;}));return d===t}).length;
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-num" style="color:var(--accent3)">${doneTopics}</div><div class="stat-label">Topics Done</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent1)">${totalTopics-doneTopics}</div><div class="stat-label">Topics Left</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent2)">${subsDone}/6</div><div class="stat-label">Subjects Complete</div></div>`;
  const bars=document.getElementById('subjectBars');
  bars.innerHTML=SUBJECTS.map(sub=>{
    let t=0,d=0;
    sub.units.forEach((u,ui)=>u.topics.forEach((_,ti)=>{t++;if(s[`${sub.id}_${ui}_${ti}`])d++;}));
    const pct=t?Math.round(d/t*100):0;
    return `<div class="sub-bar-row">
      <div class="sub-bar-name" style="color:${sub.color}">${sub.code}</div>
      <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${sub.color}"></div></div>
      <div class="sub-bar-pct" style="color:${sub.color}">${pct}%</div>
    </div>`;
  }).join('');
}
 
 
function renderExams(){
  document.getElementById('examList').innerHTML=SUBJECTS.map(sub=>{
    const examDate=new Date(sub.examDate);
    const daysLeft=Math.ceil((examDate-new Date())/(1000*60*60*24));
    const dl=daysLeft>0?`<span style="color:${sub.color}">${daysLeft}d away</span>`:`<span style="color:var(--success)">Done ✓</span>`;
    return `<div class="exam-row">
      <div class="exam-date-block"><div class="exam-day" style="color:${sub.color}">${examDate.getDate()}</div><div class="exam-month">Apr</div></div>
      <div class="exam-info"><div class="exam-subj">${sub.name}</div><div class="exam-code">${sub.code} · 3:00 PM – 5:30 PM</div></div>
      <div>${dl}</div>
    </div>`;
  }).join('');
}
 
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  el.classList.add('active');
}
 
render();
</script>
</body>
</html>
